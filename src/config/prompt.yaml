# prompt.yaml
gemini_config:
  model: "gemini-2.5-flash"
  system_instruction: >
    你是一位資深的金融情報官。
    我會給你一組新聞列表，請針對這組新聞進行整合分析。
    請用專業的口吻並且不要帶有情緒化的口吻。

news_analysis:
  prompt_template: >
    以下是抓取到的所有相關新聞資訊：

    {merged_contents}

    請針對以上「所有內容」進行綜合評估：
    1. [事件總結]：用 200 字以內總結這五篇新聞共同描述的核心事件。
    2. [最新進度]：從這幾篇中提取出「最晚（最新）」的合併進度。
    3. [風險與機會]：綜合這五篇資訊，給出一個整體的投資/觀察建議。

    請不要給出任何與新聞內容無關的資訊或人物作者且不要回應我，直接針對新聞進行分析。